name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --extra dev pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Audit dependencies
        # Audit production deps strictly — those are what ship to users. Build/test
        # tooling (vite, esbuild, jsdom) never reaches the bundle. The one residual
        # dev-only advisory (GHSA-gv7w-rqvm-qjhr in esbuild) has no fix compatible
        # with vite 6 and is a Deno-install-path RCE not reachable via npm.
        run: npm audit --omit=dev --audit-level=moderate
