name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI only reads the repo (tests/build/audit). Pin the token to the minimum so a
# compromised build dependency cannot use it to write to the repo.
permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2

      - name: Run tests
        run: uv run --extra dev pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Audit dependencies
        # Audit production deps strictly — those are what ship to users. Build/test
        # tooling (vite, esbuild, jsdom) never reaches the bundle. The one residual
        # dev-only advisory (GHSA-gv7w-rqvm-qjhr in esbuild) has no fix compatible
        # with vite 6 and is a Deno-install-path RCE not reachable via npm.
        run: npm audit --omit=dev --audit-level=moderate
